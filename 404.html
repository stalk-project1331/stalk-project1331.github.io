<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>STALK</title>
    <script>
      (function () {
        var path = window.location.pathname;
        var search = window.location.search || "";
        var hash = window.location.hash || "";

        var redirect =
          "/" +
          "?p=" +
          encodeURIComponent(path) +
          "&q=" +
          encodeURIComponent(search) +
          "&h=" +
          encodeURIComponent(hash);

        window.location.replace(redirect);
      })();
    </script>
  </head>
  <body></body>
</html>
